<!DOCTYPE html>
<html lang="ko">
<head>

<title>공통영어1 어휘 연습문제 500제</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
a{color:inherit}

/* ── 커버 ── */
#cover{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
#cover h1{font-size:24px;font-weight:700;margin-bottom:6px}
#cover .sub{font-size:13px;color:#999;margin-bottom:22px;line-height:1.7}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:460px;margin-bottom:24px}
.ib{background:#fff;border:1px solid #e4e2dc;border-radius:10px;padding:14px 6px;text-align:center}
.ib .n{font-size:22px;font-weight:700;color:#3b8ad9}
.ib .l{font-size:11px;color:#aaa;margin-top:2px}
.inp{width:100%;max-width:460px;padding:11px 14px;font-size:14px;border:1px solid #d0cec8;border-radius:10px;outline:none;font-family:inherit;margin-bottom:10px;background:#fff}
.inp:focus{border-color:#3b8ad9;box-shadow:0 0 0 3px #d0e8f8}
.go-btn{width:100%;max-width:460px;padding:13px;font-size:15px;font-weight:700;background:#3b8ad9;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;transition:opacity .15s}
.go-btn:hover{opacity:.88}

/* ── 퀴즈 ── */
#quiz{display:none;max-width:720px;margin:0 auto;padding:14px 12px}
.qhdr{background:#fff;border:1px solid #e4e2dc;border-radius:12px;padding:12px 16px;margin-bottom:10px;position:sticky;top:8px;z-index:10}
.qhdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.qhdr-top h2{font-size:13px;font-weight:600;color:#555}
.stabs{display:flex;gap:5px;flex-wrap:wrap}
.stab{padding:4px 11px;font-size:11px;font-weight:500;border:1px solid #e4e2dc;border-radius:8px;background:#fff;cursor:pointer;color:#888;transition:all .15s;font-family:inherit}
.stab.on{background:#e8f1fb;color:#1a6bbf;border-color:transparent}
.prow{display:flex;align-items:center;gap:8px}
.pbg{flex:1;height:4px;background:#f0ede8;border-radius:999px;overflow:hidden}
.pfill{height:100%;background:#3b8ad9;border-radius:999px;transition:width .3s}
.ptxt{font-size:11px;color:#bbb;min-width:52px;text-align:right}
.srow{display:flex;gap:7px;margin-bottom:12px}
.sc{flex:1;background:#fff;border:1px solid #e4e2dc;border-radius:9px;padding:8px 10px}
.sl{font-size:9px;color:#ccc;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.sv{font-size:17px;font-weight:700;color:#1a1a18}
.sv.ok{color:#1a8c5e}.sv.bad{color:#c4420f}

/* ── 문제 카드 ── */
.qcard{background:#fff;border:1px solid #e4e2dc;border-radius:12px;padding:18px 16px;margin-bottom:10px}
.qnum-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.qnum{font-size:11px;color:#bbb;letter-spacing:.03em}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px}
.b1{background:#e8f1fb;color:#1a6bbf}
.b2{background:#e8f5ee;color:#1a7a4a}
.b3{background:#fef3e4;color:#a06010}
.b4{background:#f5e8fb;color:#7a1a8c}
.qeng{font-size:16px;font-weight:500;color:#1a1a18;margin-bottom:4px;line-height:1.6;word-break:keep-all}
.qkor{font-size:12px;color:#999;margin-bottom:12px;line-height:1.6;word-break:keep-all}
.qhint{font-size:12px;color:#bbb;margin-bottom:6px}
.answer-area{margin-top:4px}

/* 선택형 */
.opts{display:flex;flex-direction:column;gap:6px}
.obtn{width:100%;text-align:left;padding:10px 13px;background:#fafaf8;border:1px solid #e8e6e0;border-radius:9px;font-size:13px;color:#1a1a18;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit;transition:all .15s}
.obtn:hover:not(:disabled){background:#f0ede8;border-color:#c8c5bf}
.obtn.ok{background:#eaf5ed;border-color:#4aaa70;color:#1a6640}
.obtn.bad{background:#fdf0eb;border-color:#d06030;color:#8b2e10}
.olbl{font-size:10px;font-weight:700;color:#ccc;min-width:13px;flex-shrink:0}
.obtn.ok .olbl{color:#1a6640}.obtn.bad .olbl{color:#8b2e10}

/* 타이핑형 */
.trow{display:flex;gap:7px}
.ti{flex:1;padding:9px 12px;font-size:14px;border:1px solid #d0cec8;border-radius:9px;background:#fff;color:#1a1a18;outline:none;font-family:inherit}
.ti:focus{border-color:#3b8ad9;box-shadow:0 0 0 2px #d0e8f8}
.ti.ok{border-color:#4aaa70;background:#eaf5ed;color:#1a6640}
.ti.bad{border-color:#d06030;background:#fdf0eb;color:#8b2e10}
.ti:disabled{opacity:1}
.ck-btn{padding:9px 15px;font-size:13px;font-weight:600;background:#3b8ad9;color:#fff;border:none;border-radius:9px;cursor:pointer;font-family:inherit;transition:opacity .15s;white-space:nowrap}
.ck-btn:hover{opacity:.85}
.fb{font-size:12px;margin-top:5px;min-height:16px;color:#bbb}
.fb.ok{color:#1a8c5e;font-weight:500}.fb.bad{color:#c4420f;font-weight:500}

/* 매칭형 */
.match-item{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.match-word{font-size:13px;font-weight:500;min-width:120px;color:#1a1a18}
.match-sel{flex:1;padding:8px 10px;font-size:13px;border:1px solid #d0cec8;border-radius:8px;background:#fff;color:#1a1a18;outline:none;font-family:inherit}
.match-sel.ok{border-color:#4aaa70;background:#eaf5ed;color:#1a6640}
.match-sel.bad{border-color:#d06030;background:#fdf0eb;color:#8b2e10}
.match-submit{padding:8px 16px;font-size:12px;font-weight:600;background:#3b8ad9;color:#fff;border:none;border-radius:9px;cursor:pointer;font-family:inherit;margin-top:6px;display:block;transition:opacity .15s}
.match-submit:hover{opacity:.85}

/* 배열형 */
.arr-box{background:#f5f3ef;border:1px dashed #d0cec8;border-radius:9px;padding:12px 14px;margin-bottom:8px}
.arr-fill-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.arr-fill-label{font-size:12px;color:#888}
.arr-select{padding:6px 10px;font-size:13px;border:1px solid #d0cec8;border-radius:7px;background:#fff;color:#1a1a18;outline:none;font-family:inherit}
.arr-words{font-size:12px;color:#888;margin-bottom:8px}
.arr-words span{background:#fff;border:1px solid #d0cec8;border-radius:5px;padding:2px 7px;margin:2px;display:inline-block;font-size:12px;color:#555}
.arr-input{width:100%;padding:9px 12px;font-size:13px;border:1px solid #d0cec8;border-radius:9px;background:#fff;color:#1a1a18;outline:none;font-family:inherit;margin-bottom:4px}
.arr-input:focus{border-color:#7a1a8c;box-shadow:0 0 0 2px #e8d8f5}
.arr-input.ok{border-color:#4aaa70;background:#eaf5ed;color:#1a6640}
.arr-input.bad{border-color:#d06030;background:#fdf0eb;color:#8b2e10}
.arr-hint{font-size:11px;color:#bbb;margin-bottom:6px}

/* 다음 버튼 */
.nxt{width:100%;padding:10px;font-size:13px;font-weight:600;background:#fff;border:1px solid #d0cec8;border-radius:10px;cursor:pointer;color:#333;margin-top:8px;font-family:inherit;display:none;transition:background .15s}
.nxt:hover{background:#f5f3ef}

/* ── 완료 화면 ── */
#done{display:none;max-width:600px;margin:0 auto;padding:32px 16px;text-align:center}
.done-card{background:#fff;border:1px solid #e4e2dc;border-radius:16px;padding:32px 24px}
.done-em{font-size:48px;margin-bottom:12px}
.done-title{font-size:20px;font-weight:700;margin-bottom:8px}
.done-sub{font-size:14px;color:#888;margin-bottom:24px;line-height:1.7}
.done-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.dsc{background:#f5f4f0;border-radius:10px;padding:12px 6px;text-align:center}
.dsl{font-size:10px;color:#aaa;margin-bottom:3px}
.dsv{font-size:18px;font-weight:700;color:#1a1a18}
.dsv.ok{color:#1a8c5e}.dsv.bad{color:#c4420f}
.done-btns{display:flex;flex-direction:column;gap:8px;max-width:360px;margin:0 auto 20px}
.dbtn{padding:12px;font-size:14px;font-weight:600;border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:opacity .15s}
.dbtn:hover{opacity:.88}
.dbtn.b{background:#3b8ad9;color:#fff}
.dbtn.g{background:#1a8c5e;color:#fff}
.dbtn.o{background:#e07a20;color:#fff}
.email-area{background:#f5f4f0;border-radius:10px;padding:16px;margin-top:12px;text-align:left}
.email-area h3{font-size:13px;font-weight:600;margin-bottom:10px;color:#555}
.email-row{display:flex;gap:7px;margin-bottom:8px}
.email-inp{flex:1;padding:9px 12px;font-size:13px;border:1px solid #d0cec8;border-radius:8px;background:#fff;outline:none;font-family:inherit}
.email-inp:focus{border-color:#3b8ad9;box-shadow:0 0 0 2px #d0e8f8}
.send-btn{padding:9px 16px;font-size:13px;font-weight:600;background:#e07a20;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;transition:opacity .15s;white-space:nowrap}
.send-btn:hover{opacity:.85}
.send-note{font-size:11px;color:#aaa;line-height:1.6}
.wl{text-align:left;margin-top:12px;max-height:240px;overflow-y:auto}
.wlt{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.wi{font-size:12px;padding:5px 0;border-bottom:1px solid #f0ede8;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wi:last-child{border-bottom:none}
.wi .we{color:#1a1a18;font-weight:500}.wi .wa{color:#aaa}
</style>
</head>
<body>

<!-- ══════════ 커버 ══════════ -->
<div id="cover">

<!-- ══════════ 퀴즈 ══════════ -->
<div id="quiz">

<div id="done">

    <div class="wl" id="wl"></div>
  </div>
</div>

[1,"Just as you don't know everything ( __ ) about a trip, neither can you know how your new life might unfold.","여행에 대해 모든 것을 사전에 알지 못하는 것처럼, 새로운 삶이 어떻게 펼쳐질지도 알 수 없다.","① gradually  ② in advance  ③ instantly  ④ rather than","② in advance"],

// ═══════════════════════════════════════════════════════════════
// 퀴즈 엔진
// ═══════════════════════════════════════════════════════════════
let userName='', userClass='';
let allQ=[], queue=[], qIdx=0, cor=0, wrng=0, answered=false;
let wrongLog=[];
const SECTIONS=[
  {id:'s1',label:'1~100',start:0,end:99},
  {id:'s2',label:'101~200',start:100,end:199},
  {id:'s3',label:'201~250',start:200,end:249},
  {id:'s4',label:'251~300',start:250,end:299},
  {id:'s5',label:'301~400',start:300,end:399},
  {id:'s6',label:'401~500',start:400,end:499},
];
let curSection=null;

function buildAllQ(){
  allQ=[];
  // P1: 선택형
  P1.forEach(d=>allQ.push({no:d[0],type:'sel',eng:d[1],kor:d[2],opts:d[3],ans:d[4]}));
  // P2: 타이핑 (한글해석 있음)
  P2.forEach(d=>allQ.push({no:d[0],type:'type',eng:d[1],kor:d[2],hint:d[3],ans:d[4]}));
  // P3: 매칭(뜻쓰기)
  P3_MATCH.forEach(d=>allQ.push({no:d[0],type:'match',word:d[1],ans:d[2]}));
  // P4: 배열 - 빈칸보기 + 단어배열
  P4.forEach(d=>allQ.push({no:d[0],type:'arr',eng:d[1],kor:d[2],choiceHint:d[3],words:d[4],blankAns:d[5],arrAns:d[6]}));
  // P5: 선택형
  P5.forEach(d=>allQ.push({no:d[0],type:'sel',eng:d[1],kor:d[2],opts:d[3],ans:d[4]}));
  // P6: 타이핑 (한글해석 있음)
  P6.forEach(d=>allQ.push({no:d[0],type:'type',eng:d[1],kor:d[2],hint:d[3],ans:d[4]}));
}

function startQuiz(){
  userName=document.getElementById('nameInput').value.trim()||'익명';
  userClass=document.getElementById('classInput').value.trim()||'—';
  if(!userName){alert('이름을 입력해주세요!');return;}
  buildAllQ();
  document.getElementById('cover').style.display='none';
  document.getElementById('quiz').style.display='block';
  document.getElementById('hdr-name').textContent=userName+' 님';
  buildTabs();
  loadSection(null);
}

function buildTabs(){
  const wrap=document.getElementById('stabs');
  wrap.innerHTML='<button class="stab on" onclick="loadSection(null)">전체</button>';
  SECTIONS.forEach(s=>{
    wrap.innerHTML+=`<button class="stab" id="${s.id}" onclick="loadSection('${s.id}')">${s.label}</button>`;
  });
}

function loadSection(sid){
  curSection=sid;
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));
  if(!sid){document.querySelector('.stab').classList.add('on');queue=[...allQ];}
  else{
    document.getElementById(sid).classList.add('on');
    const s=SECTIONS.find(x=>x.id===sid);
    queue=allQ.slice(s.start,s.end+1);
  }
  qIdx=0; cor=0; wrng=0; answered=false;
  upStats(); showQ();
}

function upStats(){
  const tot=queue.length, done=cor+wrng;
  document.getElementById('pb').style.width=tot?(done/tot*100)+'%':'0%';
  document.getElementById('pt').textContent=done+' / '+tot;
  document.getElementById('sc').textContent=cor;
  document.getElementById('sw').textContent=wrng;
  document.getElementById('sl').textContent=tot-done;
  document.getElementById('sr').textContent=done?Math.round(cor/done*100)+'%':'—';
}

function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showQ(){
  if(qIdx>=queue.length){showDone();return;}
  answered=false;
  const q=queue[qIdx];
  const qa=document.getElementById('qa');
  const TYPES={'sel':'어휘 선택','type':'어법 변형','match':'어휘 매칭','arr':'문장 배열'};
  const BCLS={'sel':'b1','type':'b2','match':'b3','arr':'b4'};

  let html=`<div class="qcard">
    <div class="qnum-row"><span class="qnum">${q.no}번</span><span class="badge ${BCLS[q.type]}">${TYPES[q.type]}</span></div>`;

  if(q.type==='sel'){
    html+=`<div class="qeng">${esc(q.eng)}</div><div class="qkor">${esc(q.kor)}</div>
    <div class="answer-area"><div class="opts">`;
    const opts=q.opts.split('  ');
    opts.forEach((o,i)=>{
      html+=`<button class="obtn" onclick="chkSel(this)" data-val="${esc(o.trim())}" data-ans="${esc(q.ans)}">
        <span class="olbl">${['①','②','③','④'][i]||''}</span><span>${esc(o.trim())}</span></button>`;
    });
    html+=`</div></div>`;
  } else if(q.type==='type'){
    html+=`<div class="qeng">${esc(q.eng)}</div><div class="qkor">${esc(q.kor)}</div>
    <div class="qhint">${esc(q.hint)}</div>
    <div class="answer-area">
      <div class="trow">
        <input class="ti" id="ti" placeholder="답을 입력하세요..." onkeydown="if(event.key==='Enter')chkType()" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="ck-btn" onclick="chkType()">확인</button>
      </div>
      <div class="fb" id="fb"></div>
    </div>`;
  } else if(q.type==='match'){
    html+=`<div class="qeng" style="font-size:14px;margin-bottom:10px">다음 단어/숙어의 우리말 뜻을 쓰시오.</div>
    <div style="font-size:20px;font-weight:600;color:#1a1a18;margin-bottom:14px">${esc(q.word)}</div>
    <div class="answer-area">
      <div class="trow">
        <input class="ti" id="ti" placeholder="우리말 뜻을 입력하세요..." onkeydown="if(event.key==='Enter')chkType()" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="ck-btn" onclick="chkType()">확인</button>
      </div>
      <div class="fb" id="fb"></div>
    </div>`;
  } else if(q.type==='arr'){
    // 배열 문제: 빈칸선택 + 단어배열 (빈칸 단어는 [] 에서 제거됨)
    const words=q.words==='—'?[]:(q.words||'').split(' / ').map(w=>w.trim()).filter(w=>w);
    const choiceOpts=(q.choiceHint||'').replace('[빈칸 보기] ','').split(' / ');
    html+=`<div class="qeng">${esc(q.eng)}</div><div class="qkor">${esc(q.kor)}</div>
    <div class="answer-area">
      <div class="arr-box">
        <div class="arr-fill-row">
          <span class="arr-fill-label">① 빈칸 ( __ )에 들어갈 말:</span>
          <select class="arr-select" id="arr-sel">
            <option value="">-- 선택 --</option>
            ${choiceOpts.map(o=>`<option value="${esc(o.trim())}">${esc(o.trim())}</option>`).join('')}
          </select>
        </div>`;
    if(words.length>0){
      html+=`<div class="arr-words"><b>② [ ] 안의 단어들을 바르게 배열하세요:</b><br>
        ${words.map(w=>`<span>${esc(w)}</span>`).join('')}
      </div>
      <div class="arr-hint">단어들을 올바른 순서로 입력하세요. 빈칸 단어는 ①에서 선택한 단어입니다.</div>
      <input class="arr-input" id="arr-in" placeholder="단어를 순서대로 입력하세요 (예: you know everything about)" onkeydown="if(event.key==='Enter')chkArr()">`;
    }
    html+=`</div>
      <div class="fb" id="fb"></div>
      <button class="ck-btn" style="margin-top:8px" onclick="chkArr()">확인</button>
    </div>`;
  }
  html+=`<button class="nxt" id="nb" onclick="nextQ()">다음 문제 →</button></div>`;
  qa.innerHTML=html;
  if(q.type==='type'||q.type==='match'){
    setTimeout(()=>{const el=document.getElementById('ti');if(el)el.focus();},40);
  }
}

function chkSel(btn){
  if(answered)return; answered=true;
  const a=btn.dataset.ans;
  document.querySelectorAll('.obtn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.val===a)b.classList.add('ok');
  });
  if(btn.dataset.val===a){cor++;}
  else{btn.classList.add('bad');wrng++;recWrong();}
  document.getElementById('nb').style.display='block';
  upStats();
}

function nm(s){return String(s).toLowerCase().replace(/[~\s,.()\[\]（）\-\/]/g,'');}

function chkType(){
  if(answered)return; answered=true;
  const ti=document.getElementById('ti');
  const fb=document.getElementById('fb');
  const raw=ti.value.trim();
  const q=queue[qIdx];
  const a=q.ans;
  ti.disabled=true;
  if(nm(raw)===nm(a)){
    ti.className='ti ok'; fb.textContent='정답입니다!'; fb.className='fb ok'; cor++;
  } else {
    ti.className='ti bad'; fb.textContent='오답  —  정답: '+a; fb.className='fb bad'; wrng++; recWrong();
  }
  document.getElementById('nb').style.display='block';
  upStats();
}

function chkArr(){
  if(answered)return; answered=true;
  const q=queue[qIdx];
  const fb=document.getElementById('fb');
  const selEl=document.getElementById('arr-sel');
  const inEl=document.getElementById('arr-in');
  const selVal=(selEl?selEl.value:'').trim();
  const inVal=(inEl?inEl.value:'').trim();
  let ok=true;
  // 빈칸 정답 체크
  if(nm(selVal)!==nm(q.blankAns)){ok=false;}
  // 배열 정답 체크 (단어가 있을 때만)
  const words=q.words==='—'?[]:(q.words||'').split(' / ').filter(w=>w.trim());
  if(words.length>0 && nm(inVal)!==nm(q.arrAns)){ok=false;}
  if(selEl)selEl.disabled=true;
  if(inEl)inEl.disabled=true;
  if(ok){
    if(selEl)selEl.style.background='#eaf5ed';
    if(inEl)inEl.className='arr-input ok';
    fb.textContent='정답입니다!'; fb.className='fb ok'; cor++;
  } else {
    if(selEl)selEl.style.background='#fdf0eb';
    if(inEl)inEl.className='arr-input bad';
    fb.innerHTML=`오답  —  빈칸 정답: <b>${esc(q.blankAns)}</b>${words.length>0?`  /  배열 정답: <b>${esc(q.arrAns)}</b>`:''}`;
    fb.className='fb bad'; wrng++; recWrong();
  }
  document.getElementById('nb').style.display='block';
  upStats();
}

function recWrong(){
  const q=queue[qIdx];
  const label=q.type==='match'?q.word:(q.type==='arr'?`${q.no}번 배열`:q.eng.substring(0,40));
  if(!wrongLog.find(w=>w.no===q.no))
    wrongLog.push({no:q.no,label,ans:q.ans||q.blankAns||''});
}

function nextQ(){qIdx++;showQ();}

// ── 완료 ────────────────────────────────────────────────────
function showDone(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('done').style.display='block';
  const tot=queue.length,pct=tot?Math.round(cor/tot*100):0;
  document.getElementById('de').textContent=pct>=90?'🎉':pct>=70?'😊':pct>=50?'😅':'😓';
  document.getElementById('dt').textContent=userName+'님의 퀴즈 결과';
  document.getElementById('ds').textContent=`${userClass} · ${curSection?SECTIONS.find(s=>s.id===curSection).label+' 범위':'전체 범위'}`;
  document.getElementById('d-tot').textContent=tot;
  document.getElementById('d-cor').textContent=cor;
  document.getElementById('d-wrng').textContent=wrng;
  document.getElementById('d-pct').textContent=pct+'%';
  // 틀린 목록
  const wl=document.getElementById('wl');
  if(wrongLog.length){
    wl.innerHTML=`<div class="wlt">틀린 문제 (${wrongLog.length}개)</div>`+
      wrongLog.slice(0,50).map(w=>`<div class="wi"><span class="we">${esc(w.no+'번')}: ${esc(w.label.substring(0,30))}</span><span class="wa">정답: ${esc(w.ans)}</span></div>`).join('');
  } else {
    wl.innerHTML='<div style="text-align:center;font-size:13px;color:#bbb;padding:12px">틀린 문제가 없어요! 완벽합니다 👍</div>';
  }
}

function makeResultText(){
  const now=new Date();
  const dateStr=now.toLocaleDateString('ko-KR')+'  '+now.toLocaleTimeString('ko-KR');
  const tot=queue.length,pct=tot?Math.round(cor/tot*100):0;
  let txt=`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  txt+=`공통영어1 어휘 연습문제 결과\n`;
  txt+=`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  txt+=`이름: ${userName}\n학반번호: ${userClass}\n날짜: ${dateStr}\n`;
  txt+=`범위: ${curSection?SECTIONS.find(s=>s.id===curSection).label:'전체'}\n`;
  txt+=`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  txt+=`총 문제: ${tot}  |  정답: ${cor}  |  오답: ${wrng}  |  정답률: ${pct}%\n`;
  txt+=`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  if(wrongLog.length){
    txt+=`\n틀린 문제 목록 (${wrongLog.length}개):\n`;
    wrongLog.forEach(w=>{ txt+=`  ${w.no}번: ${w.label.substring(0,40)} → 정답: ${w.ans}\n`; });
  } else { txt+='\n틀린 문제 없음 — 완벽한 점수!\n'; }
  txt+=`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  return txt;
}

function downloadResult(){
  const txt=makeResultText();
  const blob=new Blob(['\uFEFF'+txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`공통영어1_결과_${userName}_${new Date().toLocaleDateString('ko-KR').replace(/\./g,'').replace(/ /g,'')}.txt`;
  a.click();
}

function sendEmail(){
  const to=document.getElementById('emailTo').value.trim()||'window7458@gmail.com';
  const txt=makeResultText();
  const tot=queue.length,pct=tot?Math.round(cor/tot*100):0;
  const subject=encodeURIComponent(`[공통영어1 퀴즈 결과] ${userName} / ${userClass} / ${pct}%`);
  const body=encodeURIComponent(txt);
  const mailto=`mailto:${to}?subject=${subject}&body=${body}`;
  document.getElementById('send-status').innerHTML=
    `<span style="color:#1a8c5e;font-weight:500">✓ 메일 앱을 열고 있습니다...</span><br>
    메일 앱이 열리지 않으면 아래 버튼으로 결과를 다운로드하여 직접 첨부해주세요.<br>
    수신 주소: <b>${to}</b>`;
  window.location.href=mailto;
}

function restartAll(){
  document.getElementById('done').style.display='none';
  document.getElementById('quiz').style.display='block';
  wrongLog=[];
  loadSection(curSection);
}

function retryWrong(){
  if(!wrongLog.length){restartAll();return;}
  const wrongNos=new Set(wrongLog.map(w=>w.no));
  document.getElementById('done').style.display='none';
  document.getElementById('quiz').style.display='block';
  const prevWrong=[...wrongLog];
  wrongLog=[];
  queue=allQ.filter(q=>wrongNos.has(q.no));
  qIdx=0; cor=0; wrng=0; answered=false;
  upStats(); showQ();
}
</script>
</body>
